                        'fade-in': 'fade-in 0.3s ease-out forwards',

                        'bounce-short': 'bounce-short 1s ease-in-out 1',
                        'shimmer': 'shimmer 2s infinite'
                    },
                    keyframes: {
                        'fade-in': {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        'scale-in': {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        'bounce-short': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        'shimmer': {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }

        }
    </script>

          onClearAutoOpen,
          highlightGapFiller,

        }) => {
          const [shifts, setShifts] = useState(INITIAL_SHIFTS);
          const [scheduledDetailsOpen, setScheduledDetailsOpen] = useState(false);
          const [selectedPlatformDetail, setSelectedPlatformDetail] = useState(null);

          const GAP_AMOUNT = 315;

          const scheduleRowsRef = useRef({});
          const gapFillerRef = useRef(null);

          useEffect(() => {
            if (autoOpenDetail) {
              setSelectedPlatformDetail(autoOpenDetail);
              setScheduledDetailsOpen(true);
              
              if (scheduleRowsRef.current[autoOpenDetail]) {
                scheduleRowsRef.current[autoOpenDetail]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }

              onClearAutoOpen();
            }
          }, [autoOpenDetail]);

          useEffect(() => {
            if (highlightGapFiller && gapFillerRef.current) {
                gapFillerRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, [highlightGapFiller]);

          const BASE_SCHEDULE_STATS = [
              { platform: 'Uber', hours: 12, earnings: 260, color: 'bg-black text-white' },
              { platform: 'DoorDash', hours: 6, earnings: 110, color: 'bg-red-600 text-white' },
              { platform: 'Instacart', hours: 0, earnings: 0, color: 'bg-orange-500 text-white' },
          ];

          const BASE_SCHEDULED_DETAILS = {
            'Uber': [
              { id: 'u1', date: '周一', time: '18:00 - 22:00', amount: 95, hours: 4, tags: ['晚高峰'] },
              { id: 'u2', date: '周三', time: '08:00 - 12:00', amount: 80, hours: 4 },
              { id: 'u_target', date: '周五', time: '17:00 - 21:00', amount: 112, hours: 4, tags: ['目标任务'] }, 
              { id: 'u_task3', date: '周六', time: '12:00 - 18:00', amount: 168, hours: 6, tags: ['信用卡还款'] }, 
              { id: 'u3', date: '周五', time: '18:00 - 22:00', amount: 85, hours: 4, tags: ['周末前夜'] },
            ],
            'DoorDash': [
              { id: 'd1', date: '周二', time: '11:00 - 14:00', amount: 60, hours: 3, tags: ['午餐高峰'] },
              { id: 'd_task2', date: '周日', time: '16:00 - 21:00', amount: 140, hours: 5, tags: ['应急基金'] }, 
              { id: 'd2', date: '周四', time: '11:00 - 14:00', amount: 50, hours: 3 },
            ],
            'Instacart': []
          };

          const handleToggleShift = (id) => {
            setShifts(prev => prev.map(shift => {
              if (shift.id === id) {
                return { ...shift, selected: !shift.selected };
              }
              return shift;
            }));
          };

          const handleAcceptGapFill = (ids) => {
            setShifts(prev => prev.map(shift => {
              if (ids.includes(shift.id)) {
                return { ...shift, selected: true };
              }
              return shift;
            }));
          };

          const handleOpenDetails = (platform) => {
            setSelectedPlatformDetail(platform);
            setScheduledDetailsOpen(true);
          };

          const selectedShifts = shifts.filter(s => s.selected);
          const availableShifts = shifts.filter(s => !s.selected);

          const totalHours = selectedShifts.reduce((acc, s) => acc + s.hours, 0);
          const totalAmount = selectedShifts.reduce((acc, s) => acc + s.amount, 0);
          const totalPoints = selectedShifts.reduce((acc, s) => acc + s.bonusPoints, 0);

          const dynamicSchedule = BASE_SCHEDULE_STATS.map(base => {
              const addedShifts = selectedShifts.filter(s => s.platform === base.platform);
              const addedHours = addedShifts.reduce((acc, s) => acc + s.hours, 0);
              const addedEarnings = addedShifts.reduce((acc, s) => acc + s.amount, 0);

              return {
                  ...base,
                  hours: base.hours + addedHours,
                  earnings: base.earnings + addedEarnings,
                  hasNew: addedShifts.length > 0
              };
          });
          
          const currentTotal = dynamicSchedule.reduce((acc, curr) => acc + curr.earnings, 0);

          const getPlatformDetails = (platformName) => {
              const baseDetails = BASE_SCHEDULED_DETAILS[platformName] || [];
              const newDetails = selectedShifts
                .filter(s => s.platform === platformName)
                .map(s => ({
                    id: s.id,
                    date: s.date,
                    time: s.time,
                    amount: s.amount,
                    hours: s.hours,
                    tags: ['新添加']
                }));
              return [...baseDetails, ...newDetails];
          };

          const remainingGap = Math.max(0, GAP_AMOUNT - totalAmount);
          const isGapCovered = totalAmount >= GAP_AMOUNT;

          const getGapSuggestions = () => {
            if (remainingGap <= 0) return [];
            
            const sorted = [...availableShifts].sort((a, b) => b.amount - a.amount);
            const suggestions = [];
            let currentSum = 0;
            
            for (const shift of sorted) {
              if (currentSum < remainingGap) {
                suggestions.push(shift);
                currentSum += shift.amount;
              } else {
                if (currentSum >= remainingGap) break;
              }
            }
            
            return suggestions;
          };

          const gapSuggestions = getGapSuggestions();

          return (
            <div 
              className="max-w-6xl mx-auto relative"
              onMouseMove={() => {
                if (highlightedPlatform || highlightGapFiller || highlightedSideBarAmount) {

                    <button onClick={() => setFilter('overdue')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${filter === 'overdue' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>逾期 (0)</button>
                </div>
                <button className="flex items-center gap-2 border border-gray-200 bg-white px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50"><ArrowUpDown size={14} /> 排序: 日期</button>
              </div>
              
              <div className="space-y-6">
                {displayedBills.map(bill => {
                    if (bill.status === 'paid' && (filter === 'all' || filter === 'paid')) {
                         return <DetailedBillCard key={bill.id} bill={bill} />;
                    }
                    return <BillItem key={bill.id} bill={bill} onToggleAutoPay={onToggleAutoPay} />;
                })}
                {displayedBills.length === 0 && (
                    <div className="text-center py-12 text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-gray-200">
                        没有找到符合条件的账单
                    </div>
                )}
              </div>
            </div>
          );
        };

        const AchievementsView = () => {
          return (
            <div>
              <div className="mb-8">
                <h2 className="text-2xl font-bold text-slate-900 mb-1">成就中心</h2>
                <p className="text-slate-500">追踪您的进度并兑换专属奖励</p>
              </div>

              <div className="bg-gradient-to-r from-amber-500 to-orange-600 rounded-2xl p-5 text-white mb-8 shadow-xl shadow-orange-200 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                <div className="flex flex-col md:flex-row justify-between items-end relative z-10 gap-4">
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1 opacity-90">
                      <Crown size={16} />
                      <span className="text-[10px] font-bold uppercase tracking-wider">当前等级</span>
                    </div>
                    <h1 className="text-3xl font-bold mb-1">白银会员</h1>
                    <p className="text-xs opacity-90 max-w-lg leading-relaxed">
                      您已击败 65% 的用户！再获得 <span className="font-bold text-white border-b border-white/40">550 积分</span> 即可升级为黄金会员，享受提现免手续费特权。
                    </p>
                  </div>
                  <div className="text-left md:text-right w-full md:w-auto bg-white/10 px-4 py-3 rounded-xl backdrop-blur-sm border border-white/10 min-w-[120px]">
                    <div className="text-[10px] opacity-80 mb-0.5">可用积分</div>
                    <div className="text-3xl font-bold tracking-tight">2,450</div>
                  </div>
                </div>
                <div className="mt-4">
                  <div className="flex justify-between text-[10px] font-medium opacity-80 mb-1">
                    <span>当前进度</span>
                    <span>3,000 目标</span>
                  </div>
                  <div className="h-1.5 w-full bg-black/20 rounded-full overflow-hidden">
                    <div className="h-full bg-white/90 w-[82%] shadow-[0_0_10px_rgba(255,255,255,0.5)] relative overflow-hidden">
                       <div className="absolute inset-0 bg-white/30 w-full h-full animate-shimmer"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-12 gap-6">
                <div className="col-span-12 space-y-6">
                  
                  <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="font-bold text-slate-900 flex items-center gap-2 text-base">
                        <Trophy size={18} className="text-amber-500" /> 
                        我的成就
                      </h3>
                      <span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2.5 py-1 rounded-full">已解锁 3/8</span>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      <AchievementCard 
                        icon={<Zap size={20} />} 
                        title="全勤达人" 
                        desc="连续 7 天完成至少 1 个任务" 
                        unlocked={true} 
                      />
                      <AchievementCard 
                        icon={<Wallet size={20} />} 
                        title="储蓄先锋" 
                        desc="单月储蓄金额超过 $500" 
                        unlocked={true} 
                      />
                      <AchievementCard 
                        icon={<Star size={20} />} 
                        title="五星好评" 
                        desc="在任意平台获得 100 个五星评价" 
                        unlocked={true} 
                      />
                      <AchievementCard 
                        icon={<TrendingUp size={20} />} 
                        title="收入翻倍" 
                        desc="单周收入环比增长 100%" 
                        unlocked={false} 
                      />
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                     <div className="flex justify-between items-center mb-6">
                      <h3 className="font-bold text-slate-900 flex items-center gap-2 text-base">
                        <Gift size={18} className="text-indigo-500" /> 
                        热门兑换
                      </h3>
                      <button className="text-xs font-bold text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50 px-2.5 py-1 rounded-lg transition-colors">查看全部</button>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      <RewardItem icon={<Fuel size={20} />} title="$10 加油卡" type="Shell / Exxon" points={1000} />
                      <RewardItem icon={<Coffee size={20} />} title="$5 咖啡券" type="Starbucks" points={500} />
                      <RewardItem icon={<Zap size={20} />} title="提现费免除" type="一次性特权" points={800} />
                    </div>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        // --- 7. 主程序 (Main App) ---

        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [isLowBalance, setIsLowBalance] = useState(true); 
          const [highlightedPlatform, setHighlightedPlatform] = useState(null);
          const [highlightedIsUrgent, setHighlightedIsUrgent] = useState(false);
          const [autoOpenDetail, setAutoOpenDetail] = useState(null);
          const [highlightGapFiller, setHighlightGapFiller] = useState(false);
          const [showDebug, setShowDebug] = useState(false); 
          const [highlightedSideBarAmount, setHighlightedSideBarAmount] = useState(null); 
          
          const [bills, setBills] = useState(INITIAL_BILLS);
          const [tasks, setTasks] = useState(isLowBalance ? [URGENT_TASK, ...INITIAL_TASKS] : INITIAL_TASKS);
          const [points, setPoints] = useState(2450);
          const [toast, setToast] = useState({ message: '', visible: false, type: 'success' });
          const toastTimeout = useRef(null);

          useEffect(() => {
            setTasks(isLowBalance ? [URGENT_TASK, ...INITIAL_TASKS] : INITIAL_TASKS);
          }, [isLowBalance]);

          const showToast = (message, type = 'success') => {
            if (toastTimeout.current) clearTimeout(toastTimeout.current);
            setToast({ message, visible: true, type });
            toastTimeout.current = setTimeout(() => {
              setToast(prev => ({ ...prev, visible: false }));
            }, 3000);
          };

          const handleToggleAutoPay = (id) => {
            const targetBill = bills.find(b => b.id === id);
            if (!targetBill) return;
            
            const willEnable = !targetBill.autoPay;
            setBills(prev => prev.map(bill => {
              if (bill.id === id) {
                return { ...bill, autoPay: !bill.autoPay };
              }
              return bill;
            }));
            showToast(willEnable ? "AI 自动支付已开启" : "自动支付已取消", willEnable ? 'success' : 'default');
          };

          const handlePayBill = (id) => {
            setBills(prev => prev.map(bill => {
                if (bill.id === id) {
                    return {
                        ...bill,
                        status: 'paid',
                        paymentDate: '今天',
                        paymentMethod: 'AI 助手',
                        accountStatus: '正常',
                        daysLeft: undefined
                    };
                }
                return bill;
            }));
            setPoints(prev => prev + 50);
          };

          const toggleSimulation = () => {
              setIsLowBalance(!isLowBalance);
          };

          const handlePlanClick = (platform, type, isUrgent = false, amount) => {
              if (type === 'scheduled') {
                setAutoOpenDetail(platform);
                setHighlightedPlatform(null); 
                setHighlightedIsUrgent(false);
                setHighlightedSideBarAmount(amount || null); 
              } else {
                setHighlightedPlatform(platform);
                setHighlightedIsUrgent(isUrgent);
                setAutoOpenDetail(null);
                setHighlightedSideBarAmount(null);
              }
              setCurrentView('shift-planning');
          };

          const handleViewGapSolution = () => {
              setCurrentView('shift-planning');
              setTimeout(() => setHighlightGapFiller(true), 100); 
          };

          const clearHighlight = () => {
              setHighlightedPlatform(null);
              setHighlightedIsUrgent(false);
              setHighlightGapFiller(false);
              setHighlightedSideBarAmount(null); 
          };
          
          const clearAutoOpen = () => {
              setAutoOpenDetail(null);
          };

          return (
            <div className="min-h-screen font-sans text-slate-600 flex">
              <Sidebar currentView={currentView} onChangeView={setCurrentView} />
              
              <main className="flex-1 ml-64 p-8 max-w-7xl mx-auto">
                
                {currentView === 'dashboard' && (
                   <div className="animate-fade-in">
                     <header className="flex justify-between items-end mb-8">
                      <div>
                        <div className="flex items-center gap-2 mb-1"><h2 className="text-2xl font-bold text-slate-900">您的财务任务</h2><span className="bg-[#1e255e] text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">{tasks.length}</span><span className="bg-orange-500 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full flex gap-0.5"><Zap size={10} fill="currentColor" /> 3</span></div>
                        <p className="text-slate-500">基于您目标的个性化工作计划</p>
                      </div>
                      <div className="flex gap-4">
                        <button 
                            onClick={toggleSimulation}
                            className="bg-white p-2.5 rounded-xl border border-gray-200 text-slate-400 hover:text-slate-600 relative"
                            title="Toggle Low Balance Simulation"
                        >
                            <Bell size={20} />
                            {isLowBalance && <span className="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>}
                        </button>
                        <button className="bg-[#1e255e] text-white px-4 py-2.5 rounded-xl font-medium shadow-lg hover:bg-[#151b46] transition-colors flex items-center gap-2"><Settings size={18} /> 自定义</button>
                      </div>
                    </header>

                    {isLowBalance && <CriticalAlert onAction={handleViewGapSolution} />}

                    <div className="mb-8">
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard 
                            label="当前余额" 
                            value={isLowBalance ? "$327.56" : "$1,247.56"} 
                            subtext="支票账户" 
                            icon={<Wallet size={16} className="text-slate-600" />} 
                            colorClass="bg-slate-100" 
                            variant={isLowBalance ? 'danger' : 'normal'}
                        />
                        <StatCard label="未来 7 天" value="$710" subtext="AI 预测收入" icon={<TrendingUp size={16} className="text-emerald-600" />} colorClass="bg-emerald-100" />
                        <StatCard label="到期账单" value={`$${bills.filter(b => b.status === 'pending').reduce((a,b) => a+b.amount, 0)}`} subtext="待处理" icon={<CalendarClock size={16} className="text-blue-600" />} colorClass="bg-blue-100" />
                        <StatCard 
                            label="支出趋势" 
                            value="↓ 12%" 
                            subtext="比上月少支 $150" 
                            icon={<TrendingUp size={16} className="text-indigo-600 rotate-180" />} 
                            colorClass="bg-indigo-100" 
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-12 lg:grid-cols-7 gap-6 items-stretch">
                      <div className="col-span-12 lg:col-span-2 flex flex-col">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-800">智能分析</h3>
                        </div>
                        <div className="flex-1 flex flex-col gap-6">
                            <div className="flex-1">
                                <AICard className="h-full" isLowBalance={isLowBalance} />
                            </div>
                        </div>
                      </div>

                      <div className="col-span-12 lg:col-span-5 flex flex-col">
                         <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-800">活跃任务</h3>
                            <span className="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-full">2/3 已完成</span>
                         </div>
                         <div className="space-y-4 flex-1">
                            {tasks.map(task => (
                              <TaskCard 
                                key={task.id} 
                                task={task} 
                                onPlanClick={handlePlanClick} 
                              />
                            ))}
                         </div>
                      </div>
                    </div>
                   </div>
                )}

                {currentView === 'expenses' && (
                  <ExpensesView 
                    onViewDetails={() => setCurrentView('bill-details')} 
                    bills={bills} 
                    onPayBill={handlePayBill} 
                    onToggleAutoPay={handleToggleAutoPay} 
                    isLowBalance={isLowBalance} 
                    onViewGapSolution={handleViewGapSolution}
                  />
                )}

                {currentView === 'bill-details' && (
                  <BillDetailsView onBack={() => setCurrentView('expenses')} bills={bills} onToggleAutoPay={handleToggleAutoPay} />
                )}

                {currentView === 'shift-planning' && (
                  <ShiftPlanningView 
                    isLowBalance={isLowBalance} 
                    highlightedPlatform={highlightedPlatform}
                    highlightedIsUrgent={highlightedIsUrgent}
                    onClearHighlight={clearHighlight}
                    autoOpenDetail={autoOpenDetail}
                    onClearAutoOpen={clearAutoOpen}
                    highlightGapFiller={highlightGapFiller}
                    highlightedSideBarAmount={highlightedSideBarAmount}
                  /> 
                )}

                {currentView === 'achievements' && (
                  <AchievementsView />
                )}

              </main>

              <ChatWidget bills={bills} onPayBill={handlePayBill} />
              
              <div className="fixed top-6 right-8 z-50 flex flex-col items-end pointer-events-none gap-2">
                <div 
                    className={`pointer-events-auto transition-all duration-300 transform origin-top-right
                        ${showDebug ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-95 -translate-y-4 pointer-events-none h-0'}
                    `}
                >
                    <div className="bg-white/90 backdrop-blur-sm border border-gray-200 p-1.5 rounded-xl shadow-lg flex items-center gap-1">
                        <span className="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-wider">预览模式</span>
                        <button 
                            onClick={() => setIsLowBalance(false)}
                            className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${!isLowBalance ? 'bg-emerald-100 text-emerald-700 shadow-sm' : 'text-slate-500 hover:bg-gray-50'}`}
                        >
                            <span className="flex items-center gap-1.5"><CheckCircle2 size={12} /> 资金充足</span>
                        </button>
                        <button 
                            onClick={() => setIsLowBalance(true)}
                            className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${isLowBalance ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-500 hover:bg-gray-50'}`}
                        >
                            <span className="flex items-center gap-1.5"><AlertCircle size={12} /> 资金不足</span>
                        </button>
                    </div>
                </div>

                <button 
                    onClick={() => setShowDebug(!showDebug)}
                    className={`pointer-events-auto w-8 h-8 rounded-full border shadow-sm flex items-center justify-center transition-all duration-300
                        ${showDebug 
                            ? 'bg-white text-slate-600 border-gray-200 hover:bg-slate-50' 
                            : 'bg-white/50 text-slate-400 border-transparent hover:bg-white hover:text-slate-600 hover:border-gray-200 hover:shadow-md'
                        }
                    `}
                    title={showDebug ? "隐藏控制" : "显示模拟控制"}
                >
                    {showDebug ? <X size={14} /> : <Settings size={14} />}
                </button>
              </div>
              
              <Toast message={toast.message} visible={toast.visible} type={toast.type} />
            </div>
          );
        }

        // --- 渲染逻辑 ---
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
